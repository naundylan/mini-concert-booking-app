plugins {
    id 'java'
    id 'org.springframework.boot' version '3.5.13'
    id 'io.spring.dependency-management' version '1.1.7'
    id 'com.diffplug.spotless' version '6.25.0'
}

group = 'org.namquyen'
version = '0.0.1-SNAPSHOT'
description = 'auth-template-backend'

repositories {
    // Use Maven Central for resolving dependencies.
    mavenCentral()
}

configurations {
    compileOnly {
        extendsFrom annotationProcessor
    }
}

dependencies {
    // Spring Boot
    implementation 'org.springframework.boot:spring-boot-starter-web'
    developmentOnly 'org.springframework.boot:spring-boot-devtools'

    // Security
    implementation 'org.springframework.boot:spring-boot-starter-security'

    // JWT
    implementation 'io.jsonwebtoken:jjwt-api:0.12.6'
    runtimeOnly 'io.jsonwebtoken:jjwt-impl:0.12.6'
    runtimeOnly 'io.jsonwebtoken:jjwt-jackson:0.12.6'

    // Dotenv
    implementation 'io.github.cdimascio:dotenv-java:3.0.0'
    implementation "me.paulschwarz:spring-dotenv:3.0.0"

    // Swagger
    implementation 'org.springdoc:springdoc-openapi-starter-webmvc-ui:2.8.9'
    implementation 'org.apache.commons:commons-lang3:3.18.0'

    // Lombok
    compileOnly 'org.projectlombok:lombok'
    annotationProcessor 'org.projectlombok:lombok'

    // Model Mapper
    implementation 'org.modelmapper:modelmapper:3.2.4'

    // Database
    runtimeOnly 'org.postgresql:postgresql'
    implementation 'org.springframework.boot:spring-boot-starter-data-jpa'

    // Flyway core + MySQL support
    implementation 'org.flywaydb:flyway-core'
    implementation 'org.flywaydb:flyway-database-postgresql'

    // Cloudinary
    implementation ('com.cloudinary:cloudinary-core:1.37.0')
    implementation ('com.cloudinary:cloudinary-http45:1.37.0') {
        exclude group: 'commons-logging', module: 'commons-logging'
    }

    // Mail
    implementation 'org.springframework.boot:spring-boot-starter-mail'

    // Validation
    implementation 'org.springframework.boot:spring-boot-starter-validation'

    // Testing
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
}

// Apply a specific Java toolchain to ease working on different environments.
java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

spotless {
    java {
        googleJavaFormat('1.22.0')
        removeUnusedImports()
        encoding 'UTF-8'
        trimTrailingWhitespace()
        endWithNewline()

        target 'src/**/*.java'
        targetExclude '**/build/**'
    }
}

tasks.withType(Test).configureEach {
    enabled = false
}

bootJar {
    mainClass = 'com.concert.booking.TicketBookingApplication'
    archiveFileName = 'ticket-app.jar'
}

tasks.withType(Test).configureEach {
    enabled = false
}
