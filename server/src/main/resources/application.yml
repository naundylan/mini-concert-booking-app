application:
  admin:
    username: ${SUPER_USER_USERNAME}
    password: ${SUPER_USER_PASSWORD}
    fullName: ${SUPER_USER_FULL_NAME}
    email: ${SUPER_USER_EMAIL}
  security:
    jwt:
      secretKey: ${JWT_SECRET}
      accessTokenExpiration: ${JWT_ACCESS_EXPIRATION}
      refreshTokenExpiration: ${JWT_REFRESH_EXPIRATION}
  socket:
    hostname: ${SOCKET_HOST:0.0.0.0}
    port: ${SOCKET_PORT:9092}
    origin: ${SOCKET_ORIGIN:http://localhost:3000}
  payment:
    bank:
      accountNumber: ${BANK_ACCOUNT_NUMBER:0000000000}
      accountName: ${BANK_ACCOUNT_NAME:MINI CONCERT BOOKING}
    vietqr:
      bankId: ${VIETQR_BANK_ID:ICB}
      accountNo: ${VIETQR_ACCOUNT_NO:}
      accountName: ${VIETQR_ACCOUNT_NAME:}
      template: ${VIETQR_TEMPLATE:compact2}
    sepay:
      apiKey: ${SEPAY_API_KEY:}
      merchantAccount: ${VIETQR_ACCOUNT_NO:}
      paymentPrefix: ${SEPAY_PAYMENT_PREFIX:SEVQR}

cloudinary:
  cloudName: ${CLOUDINARY_CLOUD_NAME}
  apiKey: ${CLOUDINARY_API_KEY}
  apiSecret: ${CLOUDINARY_API_SECRET}
  folder: ${CLOUDINARY_FOLDER}

spring:
  application:
    name: ${APPLICATION_NAME}
    version: ${APPLICATION_VERSION}

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  flyway:
    enabled: false

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
    security:
      oauth2:
        client:
          registration:
            google:
              client-id: ${CLIENT_ID}
              client-secret: ${CLIENT_SECRET}
              scope:
                - profile
                - email
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
      password: ${SPRING_REDIS_PASSWORD:}
      timeout: ${SPRING_REDIS_TIMEOUT:2s}

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

  task:
    execution:
      pool:
        core-size: ${THREAD_POOL_CORE_SIZE}
        max-size: ${THREAD_POOL_MAX_SIZE}
        queue-capacity: ${THREAD_POOL_QUEUE_CAPACITY}

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile

  # kafka:
  #   bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
  #   consumer:
  #     group-id: ${KAFKA_CONSUMER_GROUP_ID}
  #     auto-offset-reset: earliest
  #     key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
  #     value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
  #   producer:
  #     key-serializer: org.apache.kafka.common.serialization.StringSerializer
  #     value-serializer: org.apache.kafka.common.serialization.StringSerializer

springdoc:
  swagger-ui:
    path: /docs
    default-model-expand-depth: 0
    defaultModelsExpandDepth: 0
    tags-sorter: alpha

server:
  port: ${SERVER_PORT:8081}
  tomcat:
    threads:
      max: ${TOMCAT_MAX_THREADS}
      min-spare: ${TOMCAT_MIN_SPARE_THREADS}
      max-queue-capacity: ${TOMCAT_MAX_QUEUE_CAPACITY}
