services:
  postgres:
    image: postgres:16-alpine
    container_name: ticket_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password123}
      POSTGRES_DB: ${POSTGRES_DB:-ticket_booking_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: ticket_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data

  kafka:
    image: apache/kafka:3.7.0
    container_name: ticket_kafka
    restart: unless-stopped
    ports:
      - "${KAFKA_PORT:-19092}:19092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,PLAINTEXT_HOST://:19092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:19092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data

  app:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: ticket_backend
    restart: on-failure
    ports:
      - "${BACKEND_PORT:-8081}:8081"
      - "${SOCKET_PORT:-9092}:9092"
    depends_on:
      - postgres
      - redis
      - kafka
    environment:
      APPLICATION_NAME: ${APPLICATION_NAME:-mini-concert-booking-app}
      APPLICATION_VERSION: ${APPLICATION_VERSION:-0.0.1}
      SERVER_PORT: 8081
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-ticket_booking_db}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-admin}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-password123}
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_REDIS_PASSWORD: ${SPRING_REDIS_PASSWORD:-}
      SPRING_REDIS_TIMEOUT: ${SPRING_REDIS_TIMEOUT:-2s}
      KAFKA_ENABLED: ${KAFKA_ENABLED:-true}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_CONSUMER_GROUP_ID: ${KAFKA_CONSUMER_GROUP_ID:-mini-concert-booking}
      KAFKA_TOPIC_BOOKING_PAID: ${KAFKA_TOPIC_BOOKING_PAID:-booking.paid}
      SUPER_USER_USERNAME: ${SUPER_USER_USERNAME:-admin}
      SUPER_USER_PASSWORD: ${SUPER_USER_PASSWORD:-change-me}
      SUPER_USER_EMAIL: ${SUPER_USER_EMAIL:-admin@example.com}
      SUPER_USER_FULL_NAME: ${SUPER_USER_FULL_NAME:-System Admin}
      JWT_SECRET: ${JWT_SECRET:-replace-with-a-long-random-secret}
      JWT_ACCESS_EXPIRATION: ${JWT_ACCESS_EXPIRATION:-3600000}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-604800000}
      THREAD_POOL_CORE_SIZE: ${THREAD_POOL_CORE_SIZE:-5}
      THREAD_POOL_MAX_SIZE: ${THREAD_POOL_MAX_SIZE:-10}
      THREAD_POOL_QUEUE_CAPACITY: ${THREAD_POOL_QUEUE_CAPACITY:-25}
      TOMCAT_MAX_THREADS: ${TOMCAT_MAX_THREADS:-50}
      TOMCAT_MIN_SPARE_THREADS: ${TOMCAT_MIN_SPARE_THREADS:-10}
      TOMCAT_MAX_QUEUE_CAPACITY: ${TOMCAT_MAX_QUEUE_CAPACITY:-100}
      SOCKET_HOST: 0.0.0.0
      SOCKET_PORT: ${SOCKET_PORT:-9092}
      SOCKET_ORIGIN: ${SOCKET_ORIGIN:-http://localhost:3000}
      BANK_ACCOUNT_NUMBER: ${BANK_ACCOUNT_NUMBER:-0000000000}
      BANK_ACCOUNT_NAME: ${BANK_ACCOUNT_NAME:-MINI CONCERT BOOKING}
      VIETQR_BANK_ID: ${VIETQR_BANK_ID:-ICB}
      VIETQR_ACCOUNT_NO: ${VIETQR_ACCOUNT_NO:-}
      VIETQR_ACCOUNT_NAME: ${VIETQR_ACCOUNT_NAME:-}
      VIETQR_TEMPLATE: ${VIETQR_TEMPLATE:-compact2}
      SEPAY_API_KEY: ${SEPAY_API_KEY:-}
      SEPAY_PAYMENT_PREFIX: ${SEPAY_PAYMENT_PREFIX:-SEVQR}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      TICKET_MAIL_ENABLED: ${TICKET_MAIL_ENABLED:-true}
      TICKET_MAIL_DELIVERY_MODE: ${TICKET_MAIL_DELIVERY_MODE:-auto}
      TICKET_MAIL_HIGH_LOAD_ACTIVE_REQUESTS: ${TICKET_MAIL_HIGH_LOAD_ACTIVE_REQUESTS:-80}
      TICKET_MAIL_SUBJECT: ${TICKET_MAIL_SUBJECT:-Ve cua ban - Mini Concert Booking}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      CLOUDINARY_FOLDER: ${CLOUDINARY_FOLDER:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8081/api/v1}
        NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL:-http://localhost:9092}
    container_name: ticket_client
    restart: on-failure
    ports:
      - "${CLIENT_PORT:-3000}:3000"
    depends_on:
      - app
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8081/api/v1}
      NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL:-http://localhost:9092}
      NEXT_PUBLIC_ENABLE_DEV_PAYMENT: ${NEXT_PUBLIC_ENABLE_DEV_PAYMENT:-true}

  ngrok:
    profiles:
      - dev
    image: ngrok/ngrok:latest
    container_name: ticket_ngrok
    restart: unless-stopped
    command:
      - "http"
      - "app:8081"
      - "--domain=probe-studio-balmy.ngrok-free.dev"
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    depends_on:
      - app

volumes:
  postgres_data:
  redis_data:
  kafka_data:
