services:
  postgres:
    image: postgres:16-alpine
    container_name: ticket_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password123}
      POSTGRES_DB: ${POSTGRES_DB:-ticket_booking_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: ticket_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data

  app:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: ticket_backend
    restart: on-failure
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      - postgres
      - redis
    environment:
      APPLICATION_NAME: ${APPLICATION_NAME:-mini-concert-booking-app}
      APPLICATION_VERSION: ${APPLICATION_VERSION:-0.0.1}
      PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-ticket_booking_db}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-admin}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-password123}
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_REDIS_PASSWORD: ${SPRING_REDIS_PASSWORD:-}
      SUPER_USER_USERNAME: ${SUPER_USER_USERNAME:-admin}
      SUPER_USER_PASSWORD: ${SUPER_USER_PASSWORD:-change-me}
      SUPER_USER_EMAIL: ${SUPER_USER_EMAIL:-admin@example.com}
      SUPER_USER_FULL_NAME: ${SUPER_USER_FULL_NAME:-System Admin}
      JWT_SECRET: ${JWT_SECRET:-replace-with-a-long-random-secret}
      JWT_ACCESS_EXPIRATION: ${JWT_ACCESS_EXPIRATION:-3600000}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-604800000}
      THREAD_POOL_CORE_SIZE: ${THREAD_POOL_CORE_SIZE:-5}
      THREAD_POOL_MAX_SIZE: ${THREAD_POOL_MAX_SIZE:-10}
      THREAD_POOL_QUEUE_CAPACITY: ${THREAD_POOL_QUEUE_CAPACITY:-25}
      TOMCAT_MAX_THREADS: ${TOMCAT_MAX_THREADS:-50}
      TOMCAT_MIN_SPARE_THREADS: ${TOMCAT_MIN_SPARE_THREADS:-10}
      TOMCAT_MAX_QUEUE_CAPACITY: ${TOMCAT_MAX_QUEUE_CAPACITY:-100}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      CLOUDINARY_FOLDER: ${CLOUDINARY_FOLDER:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080/api/v1}
    container_name: ticket_client
    restart: on-failure
    ports:
      - "${CLIENT_PORT:-3000}:3000"
    depends_on:
      - app
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080/api/v1}

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ticket_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
  redis_data:
